# Nuxt slice — written by the nuxt fragment.

nuxt:
  route_surfaces:
    pages: pages/
    server_api:
      - server/api
      - server/routes
    middleware: middleware/
  shared_logic:
    composables: composables/
    server_only: server/
  plugins:
    directory: plugins/
    execution_suffixes:
      - .client
      - .server
  config:
    private: runtimeConfig
    public: runtimeConfig.public
  data_fetching:
    primitives:
      - useFetch
      - useAsyncData
  verification:
    build: npm run build
    preview: npm run preview
  forbidden:
    - private_runtime_config_in_public
    - server_dependency_in_client_composable
    - heavy_data_fetching_in_route_middleware
    - node_api_without_nitro_preset_support
