id: k8s
version: 1
description: >
  Kubernetes operational guardrails — namespace-per-workload, ClusterIP-by-default,
  pinned image tags, secret hygiene — plus a YAML lint hook for manifest edits.
capabilities:
  - type: project_memory
    source: content/agents.snippet.md
    region: k8s

  - type: ontology
    source: content/ontology.snippet.yaml

  - type: executable_hook
    event: PostToolUse:Edit
    source: adapters/claude-code/hooks/yaml-lint.sh
    adapters_supported: [claude-code]

owns:
  - region: k8s in AGENTS.md
  - file: .anamnesis/ontology/k8s.yaml
  - file: .claude/hooks/yaml-lint.sh
