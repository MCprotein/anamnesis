id: prisma
version: 2
description: >
  Prisma ORM operational guidelines (migrations, schema-as-source-of-truth)
  + a PostToolUse/pre-commit hook that validates schema.prisma after edits.
capabilities:
  - type: project_memory
    source: content/agents.snippet.md
    region: prisma

  - type: ontology
    source: content/ontology.snippet.yaml

  - type: executable_hook
    event: PostToolUse:Edit
    source: adapters/claude-code/hooks/prisma-validate.sh
    adapters_supported: [claude-code, codex]
    side_effects: [read-only]

owns:
  - region: prisma in AGENTS.md
  - file: .anamnesis/ontology/prisma.yaml
  - file: .claude/hooks/prisma-validate.sh
  - file: .anamnesis/codex-hooks/prisma-PostToolUse-Edit-prisma-validate.sh
